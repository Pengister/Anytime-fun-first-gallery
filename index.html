<!DOCTYPE html>

  <title>Inflatable Games Gallery</title>

  <!-- Swiper CSS -->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <style>
    :root {
      font-size: 62.5%;
      --primary: #0f172a;
      --accent: #2563eb;
      --bg: #f8fafc;
      --card-bg: #ffffff;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--primary);
    }

    .section {
      padding: 4rem 2rem;
      max-width: 120rem;
      margin: 0 auto;
    }

    .section h2 {
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 3rem;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }

    .card {
      background: var(--card-bg);
      border-radius: 1.6rem;
      overflow: hidden;
      box-shadow: 0 1rem 2rem rgba(0,0,0,0.05);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-0.5rem);
      box-shadow: 0 1.5rem 3rem rgba(0,0,0,0.08);
    }

    .card-header {
      padding: 1.5rem;
      font-size: 1.8rem;
      font-weight: 600;
    }

    .swiper {
      width: 100%;
      height: 20rem;
    }

    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .swiper-button-next,
    .swiper-button-prev {
      color: white;
      transform: scale(0.7);
    }

    .call-btn {
      display: block;
      margin: 3rem auto 0;
      padding: 1.2rem 2.4rem;
      font-size: 1.6rem;
      background: var(--accent);
      color: white;
      text-decoration: none;
      border-radius: 999px;
      width: fit-content;
      transition: background 0.3s ease, transform 0.2s ease;
    }

    .call-btn:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    /* RESPONSIVENESS */
    @media (max-width: 1024px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .gallery-grid {
        grid-template-columns: 1fr;
      }

      .swiper {
        height: 24rem;
      }
    }
  </style>

</head>

<!-- Swiper JS -->

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
  const swipers = document.querySelectorAll('.swiper');

  swipers.forEach((el) => {
    new Swiper(el, {
      loop: true,
      spaceBetween: 10,
      navigation: {
        nextEl: el.querySelector('.swiper-button-next'),
        prevEl: el.querySelector('.swiper-button-prev'),
      },
    });
  });
</script>
