<section class="booking-section">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #0a2a66;
  --accent: #1e4ed8;
  --accent-light: #eff6ff;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --bg: #f8fafc;
  --white: #ffffff;
  --border: #e2e8f0;
  --radius: 12px;
}

.booking-section {
  padding: 4rem 1.5rem;
  background-color: var(--bg);
  font-family: 'Plus Jakarta Sans', sans-serif;
  color: var(--text-main);
  box-sizing: border-box;
}

.booking-section *, .booking-section *:before, .booking-section *:after {
  box-sizing: inherit;
}

.booking-container {
  max-width: 1150px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 3rem;
  align-items: start;
}

/* --- LEFT COLUMN --- */
.info-column {
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

.booking-info h2 {
  font-size: clamp(2.2rem, 3.5vw, 2.8rem);
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.5rem;
  letter-spacing: -0.03em;
  line-height: 1.1;
}

.booking-info p {
  font-size: 1.05rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
}

.steps-list {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.step-card {
  background: var(--white);
  padding: 1rem 1.25rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: flex;
  gap: 1rem;
  align-items: center;
}

.step-number {
  background: var(--accent);
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.75rem;
  flex-shrink: 0;
}

.step-content strong {
  display: block;
  color: var(--primary);
  font-size: 0.95rem;
}

/* --- CONTACT BOX --- */
.contact-box {
  background: var(--white);
  padding: 1.5rem;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
}

.contact-item {
  display: flex;
  align-items: flex-start;
  gap: 0.8rem;
  margin-bottom: 1.2rem;
  color: var(--text-main);
  font-size: 0.9rem;
  line-height: 1.4;
}

.contact-icon {
  width: 18px;
  height: 18px;
  color: var(--accent);
  flex-shrink: 0;
  margin-top: 2px;
}

.call-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  background: var(--accent);
  color: white;
  width: 100%;
  padding: 0.85rem;
  border-radius: 8px;
  font-weight: 700;
  text-decoration: none;
  transition: 0.3s;
  font-size: 0.95rem;
}

.call-btn:hover { background: #1d46be; }

/* --- FORM CARD --- */
.form-card {
  background: var(--white);
  padding: 2.5rem;
  border-radius: 1.5rem;
  border: 1px solid var(--border);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
}

.form-grid {
  display: grid;
  gap: 1.2rem;
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

input, textarea {
  width: 100%;
  padding: 0.9rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 1rem;
  background: #fcfdfe;
}

input:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
}

.row-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}

/* --- SERVICES GRID FIXES --- */
.services-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0.75rem;
}

.check-item {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  padding: 0.8rem;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  cursor: pointer;
  background: #fcfdfe;
  transition: all 0.2s ease;
  min-height: 55px;
}

.check-item input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin: 0;
  accent-color: var(--accent);
}

.check-item span {
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--primary);
}

.check-item:has(input:checked) {
  border-color: var(--accent);
  background: var(--accent-light);
}

.submit-btn {
  width: 100%;
  padding: 1.2rem;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
}

/* --- MOBILE RESPONSIVE FIXES --- */
@media (max-width: 900px) {
  .booking-container { grid-template-columns: 1fr; }
  .info-column { order: 2; }
  .form-card { order: 1; }
}

@media (max-width: 600px) {
  .booking-section { padding: 2rem 1rem; }
  .form-card { padding: 1.5rem 1rem; }
  .row-2 { grid-template-columns: 1fr; }
  
  /* Stack checkboxes on mobile to prevent squishing */
  .services-grid { grid-template-columns: 1fr; }
  .check-item { 
    flex-direction: column; 
    padding: 1.2rem;
    gap: 0.5rem;
  }
}
</style>

<div class="booking-container">
  
  <div class="info-column">
    <div class="booking-info">
      <h2>Let's Get the Party Started.</h2>
      <p>Ready for an unforgettable experience? Fill out the form and we'll secure your date!</p>

      <div class="steps-list">
        <div class="step-card">
          <div class="step-number">1</div>
          <div class="step-content"><strong>Submit Your Request</strong></div>
        </div>
        <div class="step-card">
          <div class="step-number">2</div>
          <div class="step-content"><strong>Finalize Setup Details</strong></div>
        </div>
        <div class="step-card">
          <div class="step-number">3</div>
          <div class="step-content"><strong>Enjoy the Event!</strong></div>
        </div>
      </div>
    </div>

    <div class="contact-box">
      <div class="contact-item">
        <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        <span>1702 4th Ave NW Suite # G,<br>West Fargo, ND 58078</span>
      </div>
      
      <a href="tel:+17019971126" class="call-btn">
        <svg style="width:18px;height:18px" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
        Call/Text 701-997-1126
      </a>
    </div>
  </div>

  <div class="form-card">
    <form action="https://formsubmit.co/YOUR-EMAIL-HERE" method="POST" class="form-grid">
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" placeholder="Full Name" required>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" placeholder="Phone Number" required>
        </div>
      </div>

      <div class="form-group">
        <label>Event Location</label>
        <input type="text" name="location" placeholder="City or Full Address" required>
      </div>

      <div class="row-2">
        <div class="form-group">
          <label>Event Date</label>
          <input type="date" name="date" required onclick="this.showPicker()">
        </div>
        <div class="form-group">
          <label>Start Time</label>
          <input type="time" name="start_time" required onclick="this.showPicker()">
        </div>
      </div>

      <div class="form-group">
        <label>Select Services</label>
        <div class="services-grid">
          <label class="check-item">
            <input type="checkbox" name="service[]" value="Inflatables"> 
            <span>Inflatables</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="service[]" value="Laser Tag"> 
            <span>Laser Tag</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="service[]" value="Gellyball"> 
            <span>Gellyball</span>
          </label>
          <label class="check-item">
            <input type="checkbox" name="service[]" value="Game Bus"> 
            <span>Game Bus</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>Special Notes</label>
        <textarea name="message" rows="2" placeholder="Anything else we should know?"></textarea>
      </div>

      <input type="hidden" name="_captcha" value="false">
      <button type="submit" class="submit-btn">Check Availability</button>
    </form>
  </div>
</div>
</section>
